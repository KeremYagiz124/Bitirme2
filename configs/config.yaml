# Project Configuration
# Multi-user compatible - uses relative paths only
# User-specific overrides go in config.local.yaml (not tracked by git)

project:
  name: "Park Detection AI"
  version: "0.1.0"

model:
  yolo:
    model_size: "yolov8n"
    weights: "yolov8n.pt"
    cache_dir: "./models/cache"
    conf_threshold: 0.5
    iou_threshold: 0.45
    target_classes: [2, 3, 5, 7]

data:
  synthetic_dir: "./data/synthetic"
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  annotations_dir: "./data/annotations"

ui:
  theme: "dark"
  default_window_width: 1280
  default_window_height: 720

classification:
  mobilenet:
    input_size: [224, 224]
    num_classes: 3

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.001
  image_size: 640
  split:
    train: 0.70
    val: 0.15
    test: 0.15

classes:
  - "Park Edilebilir"
  - "Park Edilemez"
  - "Park Alani Dolu"

output:
  visualizations: "./outputs/visualizations"
  metrics: "./outputs/metrics"
  videos: "./outputs/videos"
  model_checkpoints: "./models/checkpoints"
